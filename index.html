<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Yamashiroya | Otaru Florist</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700;900&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,FILL@0..1,GRAD@0,opsz@24" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-primary": "#ffffff",
            "primary": "#7d2d00",
            "primary-container": "#a14009",
            "secondary": "#5d604d",
            "surface": "#fbfaee",
            "surface-container": "#efeee3",
            "surface-container-high": "#e9e9dd",
            "on-surface": "#1b1c15",
            "on-surface-variant": "#57423a",
            "outline": "#8a7268",
            "outline-variant": "#dec0b5",
            "background": "#fbfaee"
          },
          fontFamily: {
            "headline": ["Noto Serif JP", "serif"],
            "body": ["Noto Serif JP", "serif"],
            "label": ["Work Sans", "sans-serif"]
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .bg-hero-pattern {
      background-image: linear-gradient(to bottom, rgba(27, 28, 21, 0.2), rgba(27, 28, 21, 0.4)), url(https://lh3.googleusercontent.com/aida-public/AB6AXuBHTYOm5yd4rsCEAr7JZUAN7v0i8IhfwCm7vG_tn-9ayShUo5-27eVYnNj63o3eYpjnwC1KHCAYr8uOHpbXhhRcEe5l3v11qQUmQLByrY80MiNf022FkhbCmyYVrtVyvnzW2FNBfx5-tgI10tV_5weVEKDvkDFVsrS8RwdrnRiehM9O7-kuV_m7MH68AH7ToLLJz32dhRAVaZwNaPXG3jhJntZU0nn0AjuRXTIevx4pfGu672ZFlGDzk7LDZHns9xvc5qC0KQpHkQ);
      background-size: cover;
      background-position: center;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .layer-screen { transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out; }
    .layer-hidden { display: none; opacity: 0; transform: translateY(20px); }
  </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary">

<!-- Intro Overlay -->
<div id="intro-overlay" class="fixed inset-0 z-[100] flex items-center justify-center bg-white pointer-events-none opacity-0 hidden">
  <div class="relative w-full h-full flex items-center justify-center">
    <div id="intro-image-container" class="absolute inset-0 flex items-center justify-center scale-90 opacity-0 transition-all duration-[3000ms] ease-out">
      <img src="/intro_watercolor.png" class="w-full h-full object-cover"/>
    </div>
    <div id="intro-text" class="absolute bottom-32 text-center opacity-0 transition-all duration-1000 translate-y-4">
      <p class="text-3xl md:text-4xl font-headline tracking-[0.4em]">想いを、花にのせて。</p>
    </div>
  </div>
</div>

<header class="w-full top-0 sticky z-50 bg-[#fbfaee]/90 backdrop-blur-md">
  <div class="flex justify-between items-center px-8 py-6 max-w-screen-2xl mx-auto">
    <a href="#" class="text-3xl font-bold text-primary italic font-headline" id="logo-link">Yamashiroya</a>
    <nav class="hidden md:flex items-center space-x-12">
      <a class="nav-link font-medium tracking-wide opacity-60 hover:opacity-100 transition-opacity" href="#" id="nav-home">Home</a>
      <a class="nav-link font-medium tracking-wide opacity-60 hover:opacity-100 transition-opacity" href="#" id="nav-shop">Shop</a>
      <a class="nav-link font-medium tracking-wide opacity-60 hover:opacity-100 transition-opacity" href="#">History</a>
    </nav>
    <div class="flex items-center">
      <button id="cart-icon-btn" class="p-2 text-primary relative">
        <span class="material-symbols-outlined text-3xl">shopping_bag</span>
        <span id="cart-badge-count" class="absolute top-1 right-1 bg-primary text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
      </button>
    </div>
  </div>
</header>

<main id="main-content">
  <!-- HOMEPAGE (Landing) -->
  <div id="landing-screen" class="layer-screen">
    <section class="relative h-[921px] w-full flex items-center justify-center overflow-hidden">
      <div class="absolute inset-0 bg-hero-pattern"></div>
      <div class="relative z-10 text-center px-6">
        <h1 class="font-headline text-4xl md:text-6xl font-bold text-white mb-12">小樽の思い出に、<br/>色鮮やかなお花を。</h1>
        <button id="start-shopping" class="px-12 py-5 bg-gradient-to-br from-primary to-primary-container text-white font-headline text-2xl rounded-lg shadow-2xl">商品を選び、購入する</button>
      </div>
    </section>
  </div>

  <!-- SHOP (4-Layer Flow) -->
  <div id="order-screen" class="layer-screen layer-hidden py-16">
    <div class="max-w-screen-xl mx-auto px-6">
      
      <!-- Stepper Container (Enhanced) -->
      <div class="mb-16 flex justify-between items-center max-w-4xl mx-auto sticky top-24 z-40 bg-surface/90 backdrop-blur-md p-6 rounded-2xl shadow-sm border border-primary/5">
        <div class="step-node flex flex-col items-center gap-2 cursor-pointer group" data-step="1">
            <div id="step-c-1" class="w-10 h-10 rounded-full flex items-center justify-center font-bold transition-all group-hover:scale-110">1</div>
            <span class="text-[10px] font-bold text-primary tracking-tighter">用途</span>
        </div>
        <div class="flex-grow h-px bg-outline-variant/30 mx-4"></div>
        <div class="step-node flex flex-col items-center gap-2 cursor-pointer group" data-step="2">
            <div id="step-c-2" class="w-10 h-10 rounded-full flex items-center justify-center font-bold transition-all group-hover:scale-110">2</div>
            <span class="text-[10px] font-bold opacity-40 tracking-tighter">商品</span>
        </div>
        <div class="flex-grow h-px bg-outline-variant/30 mx-4"></div>
        <div class="step-node flex flex-col items-center gap-2 cursor-pointer group" data-step="3">
            <div id="step-c-3" class="w-10 h-10 rounded-full flex items-center justify-center font-bold transition-all group-hover:scale-110">3</div>
            <span class="text-[10px] font-bold opacity-40 tracking-tighter">色味</span>
        </div>
        <div class="flex-grow h-px bg-outline-variant/30 mx-4"></div>
        <div class="step-node flex flex-col items-center gap-2 cursor-pointer group" data-step="4">
            <div id="step-c-4" class="w-10 h-10 rounded-full flex items-center justify-center font-bold transition-all group-hover:scale-110">4</div>
            <span class="text-[10px] font-bold opacity-40 tracking-tighter">詳細</span>
        </div>
      </div>

      <!-- LAYER 1: PURPOSE -->
      <section id="step-1-area" class="layer-screen">
          <div class="text-center mb-16"><h2 class="text-4xl font-headline font-bold text-primary">用途をお選びください</h2></div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-10 max-w-3xl mx-auto">
              <button class="purpose-card p-12 bg-white rounded-3xl shadow-sm hover:shadow-2xl transition-all border border-primary/5 group" data-purpose="offering">
                  <span class="material-symbols-outlined text-6xl text-primary/30 group-hover:scale-110 transition-transform block mb-6">church</span>
                  <p class="text-2xl font-bold">お供え・お悔やみ</p>
              </button>
              <button class="purpose-card p-12 bg-white rounded-3xl shadow-sm hover:shadow-2xl transition-all border border-primary/5 group" data-purpose="celebration">
                  <span class="material-symbols-outlined text-6xl text-primary/30 group-hover:scale-110 transition-transform block mb-6">card_giftcard</span>
                  <p class="text-2xl font-bold">お祝い・ギフト</p>
              </button>
          </div>
      </section>

      <!-- LAYER 2: PRODUCT -->
      <section id="step-2-area" class="layer-screen layer-hidden pb-40">
          <button class="mb-8 flex items-center gap-2 text-primary/60 hover:text-primary transition-colors group" onclick="showStep(1)">
              <span class="material-symbols-outlined transition-transform group-hover:-translate-x-1">arrow_back</span>
              <span class="font-bold underline underline-offset-4">用途を選び直す</span>
          </button>
          <div class="text-center mb-16"><h2 class="text-4xl font-headline font-bold text-primary">お花をお選びください</h2></div>
          <div id="product-list" class="space-y-20"></div>
      </section>

      <!-- LAYER 3: COLOR -->
      <section id="step-3-area" class="layer-screen layer-hidden pb-40">
          <button class="mb-8 flex items-center gap-2 text-primary/60 hover:text-primary transition-colors group" onclick="showStep(2)">
              <span class="material-symbols-outlined transition-transform group-hover:-translate-x-1">arrow_back</span>
              <span class="font-bold underline underline-offset-4">お花を選び直す</span>
          </button>
          <div class="text-center mb-16">
              <h2 class="text-4xl font-headline font-bold text-primary mb-4">色味をお選びください</h2>
              <p id="selection-summary" class="text-primary/60 font-bold"></p>
          </div>
          <div class="grid grid-cols-2 lg:grid-cols-4 gap-8 max-w-5xl mx-auto" id="color-grid"></div>
          
          <div id="add-to-cart-container" class="mt-24 flex justify-center opacity-0 transition-opacity">
              <button id="add-to-cart-btn" class="px-20 py-6 bg-primary text-white rounded-full font-bold text-xl shadow-2xl hover:scale-105 active:scale-95 transition-all">カートに追加する</button>
          </div>
      </section>

      <!-- LAYER 4: DETAILS -->
      <section id="step-4-area" class="layer-screen layer-hidden max-w-2xl mx-auto pb-40">
          <button class="mb-8 flex items-center gap-2 text-primary/60 hover:text-primary transition-colors group" onclick="showStep(3)">
              <span class="material-symbols-outlined transition-transform group-hover:-translate-x-1">arrow_back</span>
              <span class="font-bold underline underline-offset-4">お色味の選択に戻る</span>
          </button>
          <form class="space-y-12 bg-white p-12 rounded-3xl shadow-xl">
              <h2 class="text-3xl font-headline font-bold text-primary border-b pb-6">お届け情報の入力</h2>
              <div class="space-y-8">
                  <div><label class="block text-xs font-bold uppercase tracking-widest text-primary/50 mb-3">お名前</label><input type="text" class="w-full bg-surface-container border-0 rounded-2xl p-4 h-14" placeholder="山田 太郎"/></div>
                  <div><label class="block text-xs font-bold uppercase tracking-widest text-primary/50 mb-3">想い（メッセージ）</label><textarea class="w-full bg-surface-container border-0 rounded-2xl p-4 h-40" placeholder="心のこもったメッセージを。"></textarea></div>
              </div>
              <button type="submit" class="w-full py-6 bg-primary text-white rounded-full font-bold text-2xl shadow-xl hover:scale-[1.02] active:scale-95 transition-all">注文を確定する</button>
          </form>
      </section>

    </div>
  </div>

  <!-- CART SCREEN (Overlay) -->
  <div id="cart-screen" class="fixed inset-0 z-[60] bg-surface/95 backdrop-blur-2xl translate-x-full transition-transform duration-500 overflow-y-auto px-8 py-24">
      <button id="close-cart" class="absolute top-10 right-10 text-primary"><span class="material-symbols-outlined text-4xl">close</span></button>
      <div class="max-w-2xl mx-auto w-full">
          <h2 class="text-4xl font-headline font-bold text-primary mb-12">カートの中身</h2>
          <div id="cart-items-list" class="space-y-10"></div>
          <div id="cart-footer" class="mt-20 border-t pt-12">
              <div class="flex justify-between items-center mb-10"><span class="text-xl">合計金額</span><span id="cart-total-display" class="text-4xl font-bold text-primary">¥0</span></div>
              <button id="checkout-btn" class="w-full py-6 bg-primary text-white rounded-full font-bold text-2xl shadow-2xl">詳細情報の入力へ進む</button>
          </div>
      </div>
  </div>
</main>

<script type="module" src="./main.js"></script>
</body>
</html>
