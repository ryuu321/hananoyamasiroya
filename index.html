<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>北海道小樽の百年花屋｜花の山城屋 公式サイト</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Outfit:wght@300;600&display=swap');
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  </style>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#1b1c15', secondary: '#c48f5a', surface: '#fbfaee', 'surface-container': '#f0eecc', 'surface-container-high': '#e5e2b8' }, fontFamily: { headline: ['"Noto Serif JP"', 'serif'], label: ['"Outfit"', 'sans-serif'] } } }
    }
  </script>
  <style>
    .layer-screen { transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1); min-height: 100vh; }
    .layer-hidden { opacity: 0; pointer-events: none; transform: translateY(20px); position: absolute; width: 100%; top: 0; }
    
    /* BLOOMING NAVIGATION */
    .nav-garden { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -46%); width: 140px; height: 140px; pointer-events: none; z-index: -1; filter: blur(0.6px); }
    .nav-link { position: relative; z-index: 10; display: inline-flex; align-items: center; justify-content: center; min-width: 100px; padding: 12px 0; cursor: pointer; transition: opacity 0.4s ease; }
    .soil-base { opacity: 0.35; transition: opacity 0.6s ease, transform 0.6s ease; transform-origin: center; }
    .flower-stem { transform-origin: bottom center; stroke-dasharray: 60; stroke-dashoffset: 60; transition: stroke-dashoffset 0.8s 0.15s cubic-bezier(0.45, 0, 0.55, 1); opacity: 0.6; }
    .flower-petals { transform-origin: center center; transform: scale(0) rotate(-35deg); opacity: 0; transition: transform 1s 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.8s 0.4s; }
    .nav-link.is-active .soil-base { opacity: 0.8; transform: scale(1.08); }
    .nav-link.is-active .flower-stem { stroke-dashoffset: 0; }
    .nav-link.is-active .flower-petals { transform: scale(1.25) rotate(0deg); opacity: 0.9; }

    /* PERSISTENT SIDE FLOWERS (Landing Only) */
    .home-side-frame { position: fixed; top: 0; height: 100vh; width: 15vw; z-index: 5; pointer-events: none; opacity: 0; transition: opacity 1.2s ease, transform 1s ease; }
    .home-side-left { left: 0px; background: url("./watercolor_flower_frame_full_1774948928946.png") left center no-repeat; background-size: cover; transform: scaleX(-1); }
    .home-side-right { right: 0px; background: url("./watercolor_flower_frame_full_1774948928946.png") right center no-repeat; background-size: cover; }
    body:not(.in-shop) .home-side-frame { opacity: 0.7; transform: translateX(0); }
    body.in-shop .home-side-frame { opacity: 0; transform: translateX(20px); }

    /* HERO FLOWER ENVELOPE (Embracing the center) */
    #hero-flower-envelope { position: absolute; inset: 0; display: flex; align-items: flex-end; justify-content: center; z-index: 10; pointer-events: none; }
    #hero-flower-envelope img { width: 100%; height: 100%; object-fit: contain; object-position: bottom; transform: scale(1.15); filter: drop-shadow(0 20px 40px rgba(0,0,0,0.05)); }

    #intro-overlay { backdrop-filter: blur(20px); transition: opacity 1s ease; }
    body.is-loading { overflow: hidden; }
  </style>
</head>
<body class="bg-surface text-primary font-headline overflow-x-hidden is-loading">

<div id="intro-overlay" class="fixed inset-0 z-[100] bg-primary flex flex-col items-center justify-center hidden">
  <div class="relative flex flex-col items-center">
    <div id="intro-image-container" class="relative group opacity-0 transition-all duration-1000 scale-[0.8] w-80 h-32 flex items-center justify-center"><img src="https://yamashiroya.easy-myshop.jp/c-fimg?fp=logo" class="w-full h-full object-contain brightness-0 invert shadow-2xl"/></div>
    <div id="intro-text" class="absolute bottom-32 text-center opacity-0 transition-all duration-1000 translate-y-4"><p class="text-3xl md:text-4xl font-headline tracking-[0.4em] text-white">想いを、花にのせて。</p></div>
  </div>
</div>

<header class="w-full top-0 sticky z-50 bg-[#fbfaee]/95 backdrop-blur-md border-b border-primary/5 shadow-sm">
  <div class="flex justify-between items-center px-8 py-4 max-w-screen-2xl mx-auto">
    <a href="#" class="block h-12 hover:opacity-80 transition-opacity" id="logo-link"><img src="https://yamashiroya.easy-myshop.jp/c-fimg?fp=logo" class="h-full w-auto object-contain"/></a>
    <nav class="hidden md:flex items-center space-x-12">
      <a class="nav-link font-bold text-lg" id="nav-home">ホーム
        <div class="nav-garden"><svg viewBox="0 0 100 100" class="w-full h-full"><g class="soil-base"><path d="M10,85 Q50,80 90,85" stroke="#5D4037" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.4"/><path d="M15,83 Q50,78 85,83" stroke="#3E2723" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.3"/></g><g class="soil-particle"><circle cx="20" cy="88" r="1.5" fill="#3E2723"/><circle cx="45" cy="82" r="1.2" fill="#5D4037"/><circle cx="75" cy="86" r="1.8" fill="#795548"/></g><path class="flower-stem" d="M50,85 Q45,65 50,45" stroke="#4CAF50" stroke-width="3" fill="none"/><g class="flower-petals"><circle cx="50" cy="40" r="24" fill="#f8bbd0" opacity="0.3"/><ellipse cx="65" cy="50" rx="18" ry="14" fill="#f48fb1" opacity="0.4"/><ellipse cx="35" cy="50" rx="18" ry="14" fill="#f48fb1" opacity="0.4"/><circle cx="50" cy="45" r="12" fill="#ec407a" opacity="0.6"/><circle cx="50" cy="45" r="5" fill="#c2185b" opacity="0.8"/></g></svg></div>
      </a>
      <a class="nav-link font-bold text-lg" id="nav-shop">ショップ
        <div class="nav-garden"><svg viewBox="0 0 100 100" class="w-full h-full"><g class="soil-base"><path d="M10,85 Q50,88 90,85" stroke="#5D4037" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.4"/><path d="M15,87 Q50,90 85,87" stroke="#3E2723" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.2"/></g><path class="flower-stem" d="M50,85 L50,60" stroke="#81C784" stroke-width="3" fill="none"/><g class="flower-petals"><path d="M50,60 L85,35 Q50,45 15,35 Z" fill="#FFD54F" opacity="0.5"/><circle cx="50" cy="55" r="14" fill="#FBC02D" opacity="0.4"/><circle cx="50" cy="55" r="8" fill="#F9A825" opacity="0.6"/><circle cx="50" cy="55" r="3" fill="#FFB300" opacity="0.8"/></g></svg></div>
      </a>
      <a class="nav-link font-bold text-lg" id="nav-history">当店のあゆみ
        <div class="nav-garden"><svg viewBox="0 0 100 100" class="w-full h-full"><g class="soil-base"><path d="M15,85 Q50,82 85,85" stroke="#4E342E" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.4"/><path d="M20,83 Q50,80 80,83" stroke="#263238" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.1"/></g><path class="flower-stem" d="M50,85 C55,70 45,65 50,55" stroke="#2E7D32" stroke-width="3" fill="none"/><g class="flower-petals"><circle cx="40" cy="48" r="18" fill="#9575CD" opacity="0.4"/><circle cx="60" cy="48" r="18" fill="#7986CB" opacity="0.4"/><circle cx="50" cy="60" r="20" fill="#5C6BC0" opacity="0.3"/><circle cx="50" cy="48" r="10" fill="#311B92" opacity="0.6"/><circle cx="50" cy="48" r="4" fill="#1A237E" opacity="0.8"/></g></svg></div>
      </a>
    </nav>
    <div class="flex items-center gap-6">
      <div id="header-cart-total-container" class="hidden md:flex flex-col items-end opacity-60"><span id="header-cart-total" class="text-xl font-label font-bold text-primary">¥0</span></div>
      <button id="cart-icon-btn" class="p-2 text-primary relative group"><span class="material-symbols-outlined text-4xl">local_florist</span><span id="cart-badge-count" class="absolute -top-1 -right-1 bg-primary text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-surface hidden">0</span></button>
    </div>
  </div>
</header>

<main id="main-content">
  <!-- HOMEPAGE -->
  <div id="landing-screen" class="layer-screen">
    <div class="home-side-frame home-side-left"></div>
    <div class="home-side-frame home-side-right"></div>

    <section class="relative h-[100vh] w-full flex items-center justify-center overflow-hidden bg-[#fbfaee]">
      <div id="hero-flower-envelope"><img src="./watercolor_flower_frame_full_1774948928946.png" alt="Flowers blooming"/></div>
      <div class="relative z-20 text-center px-10 pb-32">
        <h1 class="font-headline text-5xl md:text-7xl font-bold text-primary mb-10 drop-shadow-md tracking-[0.05em] leading-tight">小樽の想い出に、<br/>色鮮やかなお花を。</h1>
        <p class="text-xl font-headline text-primary/60 mb-12 tracking-[0.3em]">― 百年を歩む、北の街の花屋 ―</p>
        <button id="start-shopping" class="px-20 py-7 bg-primary text-white font-headline text-2xl rounded-full shadow-2xl hover:scale-105 active:scale-95 transition-all ring-8 ring-primary/5">お花を選び、購入する</button>
      </div>
    </section>
    
    <section class="py-40 bg-surface text-center px-8 border-b border-primary/5">
      <div class="max-w-4xl mx-auto">
        <p class="text-primary/70 font-bold tracking-[0.3em] mb-12 uppercase text-sm">Heritage of Otaru</p>
        <div class="aspect-[21/9] rounded-[3rem] overflow-hidden mb-12 shadow-2xl relative group border-8 border-white"><img src="./watercolor_pink_pastel_1774940682661.png" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000"/></div>
        <h2 class="text-3xl md:text-4xl font-headline font-bold text-primary mb-8 leading-relaxed max-w-2xl mx-auto">大正栄華の薫りそのままに。<br/>現代の感性と交わり、<br/>一輪に想いを宿らせる。</h2>
      </div>
    </section>
  </div>
  <!-- ... Remaining Shop/History screens remain as previously verified ... -->
  <div id="order-screen" class="layer-screen layer-hidden py-16">
    <div class="max-w-screen-xl mx-auto px-6">
      <div class="mb-16 flex justify-between items-center max-w-4xl mx-auto border p-6 rounded-2xl"><div class="text-sm font-bold">1.用途</div><div class="text-sm">2.商品</div><div class="text-sm">3.色味</div><div class="text-sm">4.詳細</div></div>
      <section id="step-1-area" class="layer-screen pb-40"><div class="grid md:grid-cols-2 gap-10"><button class="purpose-card p-10 bg-white rounded-3xl" data-purpose="celebration">お祝い</button><button class="purpose-card p-10 bg-white rounded-3xl" data-purpose="offering">お供え</button></div></section>
      <section id="step-2-area" class="layer-screen layer-hidden"><div id="product-list"></div></section>
      <section id="step-3-area" class="layer-screen layer-hidden"><div id="color-grid" class="grid grid-cols-4 gap-4"></div><div id="add-to-cart-container" class="opacity-0"><button id="add-to-cart-btn">カートに入れる</button></div></section>
      <section id="step-4-area" class="layer-screen layer-hidden">ご注文情報を入力</section>
    </div>
  </div>
  <div id="history-screen" class="layer-screen layer-hidden py-32 bg-[#fbfaee]">当店のあゆみ</div>
  <div id="cart-screen" class="fixed inset-0 z-[60] bg-surface/95 translate-x-full transition-transform">カート内容</div>
</main>
<footer class="bg-surface-container py-24 pb-32 text-center opacity-30">&copy; 2024 Hanano Yamashiroya.</footer>
<script type="module" src="./main.js"></script>
</body>
</html>
